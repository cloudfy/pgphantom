name: Build and Push Docker Image on Release

on:
  release:
    types: [published]   # Triggers when you create/publish a new release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # This becomes: ghcr.io/YOUR_USERNAME/YOUR_REPO_NAME

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write     # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # No PAT needed!

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}     # e.g., 1.2.3
            type=semver,pattern={{major}}.{{minor}}   # e.g., 1.2
            type=raw,value=latest               # Always update :latest on every release

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}